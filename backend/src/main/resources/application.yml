server:
  port: 8080

spring:
  application:
    name: medical-multimodal
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB

---
spring:
  config:
    activate:
      on-profile: dev
    import: optional:classpath:application-local.yml
  datasource:
    url: jdbc:h2:mem:medical;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/medical_multimodal?useSSL=false&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

---
app:
  cors:
    allowed-origins: "http://localhost:5174,http://127.0.0.1:5174"
  jwt:
    # HS256 密钥须足够长；生产务必用环境变量覆盖
    secret: ${APP_JWT_SECRET:dev-medical-multimodal-jwt-secret-key-change-me-32bytes-min}
    expire-hours: ${APP_JWT_EXPIRE_HOURS:72}
  upload:
    dir: ${APP_UPLOAD_DIR:./data/uploads}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# 阿里云 OSS（用户上传文件）。密钥请用环境变量或 application-local.yml（已加入 .gitignore），勿提交仓库。
# 启用：ALIYUN_OSS_ENABLED=true 且配置 AK/SK
alioss:
  enabled: ${ALIYUN_OSS_ENABLED:false}
  endpoint: ${ALIYUN_OSS_ENDPOINT:oss-cn-shanghai.aliyuncs.com}
  access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID:}
  access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:}
  bucket-name: ${ALIYUN_OSS_BUCKET:medi-multi}
  object-prefix: ${ALIYUN_OSS_OBJECT_PREFIX:uploads/}
